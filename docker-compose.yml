services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: payroll
      POSTGRES_PASSWORD: payroll
      POSTGRES_DB: payroll_mapper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payroll -d payroll_mapper"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Override DATABASE_URL so the container reaches the db service by name,
      # regardless of what .env.development says (which uses localhost for the venv).
      APP_ENV: development
      DATABASE_URL: postgresql://payroll:payroll@db:5432/payroll_mapper

volumes:
  pgdata:
